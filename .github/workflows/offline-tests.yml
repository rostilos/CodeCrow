name: Offline application tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHON_ENV: .llm-handoff-artifacts/p0-03/locked-python311
      MAVEN_REPOSITORY: .llm-handoff-artifacts/p0-03/dependency-cache/maven
      P007_MAVEN_REPOSITORY: .llm-handoff-artifacts/p0-07/dependency-cache/maven

    steps:
      - name: Checkout without credentials
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: 0

      - name: Authenticate P0-07 trust bundle before candidate execution
        id: p007_trust_bootstrap
        env:
          P007_PROTECTED_TRUST_BUNDLE_SHA256: ${{ vars.P007_TRUST_BUNDLE_SHA256 }}
        run: |
          TRUST_BUNDLE=tools/quality-gates/policy/trust-bundle-v1.json
          test -n "$P007_PROTECTED_TRUST_BUNDLE_SHA256"
          [[ "$P007_PROTECTED_TRUST_BUNDLE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          test ! -L "$TRUST_BUNDLE" -a -f "$TRUST_BUNDLE"
          test "$(/usr/bin/stat -c '%s' "$TRUST_BUNDLE")" -le 1048576
          test "$(/usr/bin/sha256sum "$TRUST_BUNDLE" | /usr/bin/cut -d' ' -f1)" = \
            "$P007_PROTECTED_TRUST_BUNDLE_SHA256"
          /usr/bin/python3 -I -S - \
            "$TRUST_BUNDLE" \
            "$P007_PROTECTED_TRUST_BUNDLE_SHA256" <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import re
          import stat
          import sys

          MAX_BUNDLE_BYTES = 1024 * 1024
          MAX_ENTRY_BYTES = 64 * 1024 * 1024
          ROLES = {"implementation", "policy", "schema", "workflow", "runner"}
          SHA256 = re.compile(r"^[0-9a-f]{64}$")

          def reject_duplicates(pairs):
              value = {}
              for key, item in pairs:
                  if key in value:
                      raise ValueError("duplicate trust-bundle key")
                  value[key] = item
              return value

          def safe_parts(value):
              candidate = pathlib.PurePosixPath(value) if isinstance(value, str) else None
              if (
                  candidate is None
                  or not value
                  or value == "."
                  or candidate.is_absolute()
                  or ".." in candidate.parts
                  or candidate.as_posix() != value
                  or "\\" in value
                  or any(ord(character) < 32 or ord(character) == 127 for character in value)
              ):
                  raise ValueError("unsafe trust path")
              return candidate.parts

          def read_regular(root_fd, value, size_limit):
              parts = safe_parts(value)
              parent_fd = os.dup(root_fd)
              try:
                  for component in parts[:-1]:
                      child_fd = os.open(
                          component,
                          os.O_RDONLY | os.O_DIRECTORY | os.O_NOFOLLOW,
                          dir_fd=parent_fd,
                      )
                      os.close(parent_fd)
                      parent_fd = child_fd
                  file_fd = os.open(
                      parts[-1],
                      os.O_RDONLY | os.O_NOFOLLOW,
                      dir_fd=parent_fd,
                  )
                  try:
                      metadata = os.fstat(file_fd)
                      if not stat.S_ISREG(metadata.st_mode) or metadata.st_size > size_limit:
                          raise ValueError("trusted path is not a bounded regular file")
                      chunks = []
                      remaining = size_limit + 1
                      while remaining:
                          chunk = os.read(file_fd, min(1024 * 1024, remaining))
                          if not chunk:
                              break
                          chunks.append(chunk)
                          remaining -= len(chunk)
                      raw = b"".join(chunks)
                      if len(raw) > size_limit:
                          raise ValueError("trusted path exceeds size limit")
                      return raw
                  finally:
                      os.close(file_fd)
              finally:
                  os.close(parent_fd)

          bundle_path, expected_bundle_sha256 = sys.argv[1:]
          if SHA256.fullmatch(expected_bundle_sha256) is None:
              raise ValueError("protected trust-bundle digest is malformed")
          root_fd = os.open(".", os.O_RDONLY | os.O_DIRECTORY | os.O_NOFOLLOW)
          try:
              root_identity = os.fstat(root_fd)
              bundle_raw = read_regular(root_fd, bundle_path, MAX_BUNDLE_BYTES)
              if hashlib.sha256(bundle_raw).hexdigest() != expected_bundle_sha256:
                  raise ValueError("protected trust-bundle digest mismatch")
              bundle = json.loads(bundle_raw, object_pairs_hook=reject_duplicates)
              if (
                  not isinstance(bundle, dict)
                  or set(bundle) != {"schemaVersion", "bundleId", "files"}
                  or bundle["schemaVersion"] != 1
                  or bundle["bundleId"] != "p0-07-quality-contract-v1"
                  or not isinstance(bundle["files"], list)
                  or not bundle["files"]
              ):
                  raise ValueError("malformed trust bundle")
              previous = ""
              for entry in bundle["files"]:
                  if not isinstance(entry, dict) or set(entry) != {"path", "role", "sha256"}:
                      raise ValueError("malformed trust entry")
                  path = entry["path"]
                  digest = entry["sha256"]
                  safe_parts(path)
                  if (
                      path <= previous
                      or entry["role"] not in ROLES
                      or not isinstance(digest, str)
                      or SHA256.fullmatch(digest) is None
                  ):
                      raise ValueError("unsafe trust entry")
                  previous = path
                  if hashlib.sha256(
                      read_regular(root_fd, path, MAX_ENTRY_BYTES)
                  ).hexdigest() != digest:
                      raise ValueError(f"trusted quality contract drifted: {path}")
              final_identity = os.fstat(root_fd)
              if (
                  root_identity.st_dev,
                  root_identity.st_ino,
              ) != (
                  final_identity.st_dev,
                  final_identity.st_ino,
              ):
                  raise ValueError("repository root changed during trust bootstrap")
          finally:
              os.close(root_fd)
          PY
          printf 'bundle_sha256=%s\n' \
            "$P007_PROTECTED_TRUST_BUNDLE_SHA256" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/offline-harness/requirements/ci-test.lock

      - name: Install and record the isolation runtime
        run: |
          mkdir -p .llm-handoff-artifacts/p0-03/environment
          grep -RhE '^(deb |URIs:)' /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null | \
            LC_ALL=C sort -u > .llm-handoff-artifacts/p0-03/environment/apt-source-origins.txt || true
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            bubblewrap iproute2 rootlesskit socat uidmap
          if ! grep -Eq "^$(id -un):[0-9]+:[1-9][0-9]*$" /etc/subuid; then
            sudo usermod --add-subuids 100000-165535 "$(id -un)"
          fi
          if ! grep -Eq "^$(id -un):[0-9]+:[1-9][0-9]*$" /etc/subgid; then
            sudo usermod --add-subgids 100000-165535 "$(id -un)"
          fi
          bwrap --version | tee .llm-handoff-artifacts/p0-03/environment/bwrap-version.txt
          {
            printf 'runner_os=%s\n' "${RUNNER_OS:-unknown}"
            printf 'runner_arch=%s\n' "${RUNNER_ARCH:-unknown}"
            printf 'image_os=%s\n' "${ImageOS:-unknown}"
            printf 'image_version=%s\n' "${ImageVersion:-unknown}"
            uname -a
            cat /etc/os-release
          } > .llm-handoff-artifacts/p0-03/environment/runner-image.txt
          java -version 2>&1 | \
            tee .llm-handoff-artifacts/p0-03/environment/java-version.txt
          python -VV 2>&1 | \
            tee .llm-handoff-artifacts/p0-03/environment/python-version.txt
          mvn --version 2>&1 | \
            tee .llm-handoff-artifacts/p0-03/environment/maven-version.txt
          docker version --format '{{json .}}' | \
            tee .llm-handoff-artifacts/p0-03/environment/docker-version.json
          sha256sum \
            .llm-handoff-artifacts/p0-03/environment/bwrap-version.txt \
            .llm-handoff-artifacts/p0-03/environment/runner-image.txt \
            .llm-handoff-artifacts/p0-03/environment/java-version.txt \
            .llm-handoff-artifacts/p0-03/environment/python-version.txt \
            .llm-handoff-artifacts/p0-03/environment/maven-version.txt \
            .llm-handoff-artifacts/p0-03/environment/docker-version.json | \
            tee .llm-handoff-artifacts/p0-03/environment/toolchain-metadata-sha256.txt

      - name: Resolve and freeze build dependencies outside application-test isolation
        id: p007_maven_cache
        run: |
          test -x "$(command -v bwrap)"
          mkdir -p .llm-handoff-artifacts/p0-03/environment
          sha256sum --check tools/offline-harness/requirements/ci-test.lock.sha256
          sha256sum tools/offline-harness/requirements/ci-test.lock | \
            tee .llm-handoff-artifacts/p0-03/environment/python-lock-sha256.txt
          cp tools/offline-harness/requirements/build-network-allowlist.txt \
            .llm-handoff-artifacts/p0-03/environment/build-network-allowlist.txt
          sha256sum tools/offline-harness/requirements/build-network-allowlist.txt | \
            tee .llm-handoff-artifacts/p0-03/environment/build-network-allowlist-sha256.txt
          printf '%s\n' \
            'index=https://pypi.org/simple/' \
            'artifact-host=https://files.pythonhosted.org/' > \
            .llm-handoff-artifacts/p0-03/environment/python-effective-origins.txt
          python -m venv "$PYTHON_ENV"
          "$PYTHON_ENV/bin/python" -m pip --isolated install --require-hashes \
            --index-url https://pypi.org/simple/ \
            --report "$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-03/environment/python-install-report.json" \
            -r tools/offline-harness/requirements/ci-test.lock
          sha256sum .llm-handoff-artifacts/p0-03/environment/python-install-report.json | \
            tee .llm-handoff-artifacts/p0-03/environment/python-install-report-sha256.txt
          "$PYTHON_ENV/bin/python" -m pip freeze --all | LC_ALL=C sort | \
            tee .llm-handoff-artifacts/p0-03/environment/python-resolved-freeze.txt
          sha256sum .llm-handoff-artifacts/p0-03/environment/python-resolved-freeze.txt | \
            tee .llm-handoff-artifacts/p0-03/environment/python-resolved-freeze-sha256.txt
          find java-ecosystem -name pom.xml -not -path '*/target/*' -print0 | \
            LC_ALL=C sort -z | xargs -0 sha256sum > \
            .llm-handoff-artifacts/p0-03/environment/java-pom-sha256.txt
          rm -rf "$MAVEN_REPOSITORY"
          mkdir -p "$MAVEN_REPOSITORY"
          (cd java-ecosystem && \
            mvn -s ../tools/offline-harness/maven/settings-ci.xml \
            -B --no-transfer-progress help:effective-settings \
            -Dmaven.repo.local="$GITHUB_WORKSPACE/$MAVEN_REPOSITORY" \
            -Doutput="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-03/environment/maven-effective-settings.xml")
          (cd java-ecosystem && \
            mvn -s ../tools/offline-harness/maven/settings-ci.xml \
            -B --no-transfer-progress \
            -Dmaven.repo.local="$GITHUB_WORKSPACE/$MAVEN_REPOSITORY" \
            -Poffline-persistence-lifecycle,quality-coverage \
            -pl quality/coverage-aggregate -am \
            -DskipTests dependency:go-offline)
          # dependency:go-offline does not resolve every plugin/test artifact
          # needed by this profile. Install once without tests in the authorized
          # build phase because automatic Java module names exist only in JARs,
          # and guarded target-only lanes require same-checkout reactor artifacts.
          (cd java-ecosystem && \
            mvn -s ../tools/offline-harness/maven/settings-ci.xml \
            -B --no-transfer-progress \
            -Dmaven.repo.local="$GITHUB_WORKSPACE/$MAVEN_REPOSITORY" \
            -Poffline-persistence-lifecycle,quality-coverage,p007-prebuild-without-integration-execution \
            -pl quality/coverage-aggregate -am \
            -DskipTests clean install)
          # Surefire resolves its JUnit Platform provider dynamically at test
          # execution time, so pin and preload that transitive provider without
          # executing application tests in this network-enabled build phase.
          (cd java-ecosystem && \
            mvn -s ../tools/offline-harness/maven/settings-ci.xml \
            -N -B --no-transfer-progress \
            -Dmaven.repo.local="$GITHUB_WORKSPACE/$MAVEN_REPOSITORY" \
            org.apache.maven.plugins:maven-dependency-plugin:3.6.1:get \
            -Dartifact=org.apache.maven.surefire:surefire-junit-platform:3.2.5 \
            -Dtransitive=true)
          # The project uses JUnit Platform 1.10.2, while Surefire's provider
          # POM resolves 1.9.3; preload the launcher version selected at runtime.
          (cd java-ecosystem && \
            mvn -s ../tools/offline-harness/maven/settings-ci.xml \
            -N -B --no-transfer-progress \
            -Dmaven.repo.local="$GITHUB_WORKSPACE/$MAVEN_REPOSITORY" \
            org.apache.maven.plugins:maven-dependency-plugin:3.6.1:get \
            -Dartifact=org.junit.platform:junit-platform-launcher:1.10.2 \
            -Dtransitive=true)
          "$PYTHON_ENV/bin/python" tools/offline-harness/bin/manifest-maven-cache.py \
            "$MAVEN_REPOSITORY" \
            .llm-handoff-artifacts/p0-03/environment/maven-cache-sha256.txt
          sha256sum .llm-handoff-artifacts/p0-03/environment/maven-cache-sha256.txt | \
            tee .llm-handoff-artifacts/p0-03/environment/maven-cache-manifest-sha256.txt
          "$PYTHON_ENV/bin/python" tools/offline-harness/bin/validate-build-provenance.py \
            .llm-handoff-artifacts/p0-03/environment/python-install-report.json \
            tools/offline-harness/requirements/build-network-allowlist.txt \
            .llm-handoff-artifacts/p0-03/environment/maven-effective-settings.xml \
            .llm-handoff-artifacts/p0-03/environment/maven-cache-sha256.txt \
            "$MAVEN_REPOSITORY" | \
            tee .llm-handoff-artifacts/p0-03/environment/build-provenance-validation.txt
          P007_CLOSURE=.llm-handoff-artifacts/p0-07/cache-closure
          rm -rf "$P007_MAVEN_REPOSITORY" "$P007_CLOSURE"
          mkdir -p "$P007_MAVEN_REPOSITORY" "$P007_CLOSURE"
          cp -a "$MAVEN_REPOSITORY"/. "$P007_MAVEN_REPOSITORY"/
          test -z "$(find "$P007_MAVEN_REPOSITORY" -type l -print -quit)"
          test -z "$(find "$P007_MAVEN_REPOSITORY" -name '*.lastUpdated' -print -quit)"
          "$PYTHON_ENV/bin/python" tools/offline-harness/bin/manifest-maven-cache.py \
            "$P007_MAVEN_REPOSITORY" \
            "$P007_CLOSURE/p0-07-maven-cache-manifest.sha256"
          CACHE_MANIFEST_SHA256="$(sha256sum \
            "$P007_CLOSURE/p0-07-maven-cache-manifest.sha256" | cut -d' ' -f1)"
          ENTRY_COUNT="$(wc -l < \
            "$P007_CLOSURE/p0-07-maven-cache-manifest.sha256")"
          POM_INVENTORY_SHA256="$(sha256sum \
            .llm-handoff-artifacts/p0-03/environment/java-pom-sha256.txt | cut -d' ' -f1)"
          printf '%s\n' \
            'schemaVersion=1' \
            'cachePath=.llm-handoff-artifacts/p0-07/dependency-cache/maven' \
            "cacheManifestSha256=$CACHE_MANIFEST_SHA256" \
            "entryCount=$ENTRY_COUNT" \
            "pomInventorySha256=$POM_INVENTORY_SHA256" > \
            "$P007_CLOSURE/p0-07-maven-cache.receipt"
          chmod -R a-w "$P007_MAVEN_REPOSITORY"
          chmod 0444 \
            "$P007_CLOSURE/p0-07-maven-cache-manifest.sha256" \
            "$P007_CLOSURE/p0-07-maven-cache.receipt"
          RECEIPT_SHA256="$(sha256sum \
            "$P007_CLOSURE/p0-07-maven-cache.receipt" | cut -d' ' -f1)"
          CODECROW_MAVEN_REPOSITORY="$GITHUB_WORKSPACE/$P007_MAVEN_REPOSITORY" \
          CODECROW_P007_CACHE_RECEIPT_SHA256="$RECEIPT_SHA256" \
            tools/quality-gates/bin/validate-p007-maven-cache.sh >/dev/null
          printf 'receipt_sha256=%s\n' "$RECEIPT_SHA256" >>"$GITHUB_OUTPUT"

      - name: Preload and attest exact persistence images as build infrastructure
        run: |
          PERSISTENCE_MANIFEST=tools/offline-harness/requirements/persistence-images-v1.json
          PERSISTENCE_ENV=.llm-handoff-artifacts/p0-03/environment
          DOCKER_CONFIG_ROOT="$GITHUB_WORKSPACE/$PERSISTENCE_ENV/anonymous-docker-config"
          DOCKER_HOME="$GITHUB_WORKSPACE/$PERSISTENCE_ENV/anonymous-docker-home"
          rm -rf "$DOCKER_CONFIG_ROOT" "$DOCKER_HOME"
          mkdir -p "$DOCKER_CONFIG_ROOT" "$DOCKER_HOME"
          printf '{}\n' > "$DOCKER_CONFIG_ROOT/config.json"
          mapfile -t PERSISTENCE_IMAGES < <(
            "$PYTHON_ENV/bin/python" \
              tools/offline-harness/bin/validate-persistence-images.py \
              --print-runtime-references "$PERSISTENCE_MANIFEST"
          )
          test "${#PERSISTENCE_IMAGES[@]}" -eq 3
          {
            for image in "${PERSISTENCE_IMAGES[@]}"; do
              /usr/bin/env -i \
                PATH=/usr/bin:/bin \
                HOME="$DOCKER_HOME" \
                DOCKER_CONFIG="$DOCKER_CONFIG_ROOT" \
                /usr/bin/docker pull --platform linux/amd64 "$image"
            done
          } 2>&1 | tee "$PERSISTENCE_ENV/persistence-image-preload.txt"
          /usr/bin/env -i \
            PATH=/usr/bin:/bin \
            HOME="$DOCKER_HOME" \
            DOCKER_CONFIG="$DOCKER_CONFIG_ROOT" \
            /usr/bin/docker image inspect "${PERSISTENCE_IMAGES[@]}" > \
            "$PERSISTENCE_ENV/persistence-image-inspect.json"
          "$PYTHON_ENV/bin/python" \
            tools/offline-harness/bin/validate-persistence-images.py \
            "$PERSISTENCE_MANIFEST" \
            "$PERSISTENCE_ENV/persistence-image-inspect.json" | \
            tee "$PERSISTENCE_ENV/persistence-image-validation.txt"
          cp "$PERSISTENCE_MANIFEST" "$PERSISTENCE_ENV/persistence-images-v1.json"
          sha256sum \
            "$PERSISTENCE_MANIFEST" \
            "$PERSISTENCE_ENV/persistence-image-preload.txt" \
            "$PERSISTENCE_ENV/persistence-image-inspect.json" \
            "$PERSISTENCE_ENV/persistence-image-validation.txt" | \
            tee "$PERSISTENCE_ENV/persistence-image-evidence-sha256.txt"

      # BEGIN P0-07 SOURCE-EPOCH TRUST BOUNDARY (quality-gate owned)
      - name: Pin the complete P0-07 source inventory before coverage execution
        id: p007_source_inventory
        run: |
          P007="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-07"
          QUALITY=(env PYTHONPATH=tools/quality-gates "$PYTHON_ENV/bin/python" -m quality_gates)
          TRUST_BUNDLE=tools/quality-gates/policy/trust-bundle-v1.json
          TRUST_BUNDLE_SHA256="${{ steps.p007_trust_bootstrap.outputs.bundle_sha256 }}"
          test -n "$TRUST_BUNDLE_SHA256"
          [[ "$TRUST_BUNDLE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          test ! -L "$TRUST_BUNDLE" -a -f "$TRUST_BUNDLE"
          test "$(/usr/bin/sha256sum "$TRUST_BUNDLE" | /usr/bin/cut -d' ' -f1)" = \
            "$TRUST_BUNDLE_SHA256"
          "${QUALITY[@]}" verify-trust-bundle \
            --bundle "$TRUST_BUNDLE" \
            --bundle-sha256 "$TRUST_BUNDLE_SHA256" \
            --repository-root .
          mkdir -p "$P007/source"
          "${QUALITY[@]}" resolve-source-inventory \
            --policy tools/quality-gates/policy/source-inventory-policy-v1.json \
            --repository-root . \
            --output "$P007/source/pre-test-inventory.json"
          mapfile -t INVENTORY_DIGESTS < <("$PYTHON_ENV/bin/python" -c '
          import hashlib, json, pathlib, re, sys
          artifact = pathlib.Path(sys.argv[1]).read_bytes()
          value = json.loads(artifact)
          digest = value["inventorySha256"]
          assert isinstance(digest, str) and re.fullmatch(r"[0-9a-f]{64}", digest)
          print(digest)
          print(hashlib.sha256(artifact).hexdigest())
          ' "$P007/source/pre-test-inventory.json")
          test "${#INVENTORY_DIGESTS[@]}" -eq 2
          printf 'inventory_sha256=%s\n' "${INVENTORY_DIGESTS[0]}" >> "$GITHUB_OUTPUT"
          printf 'artifact_sha256=%s\n' "${INVENTORY_DIGESTS[1]}" >> "$GITHUB_OUTPUT"
          printf 'P007_AS_OF=%s\n' "$(date -u +%F)" >> "$GITHUB_ENV"
          sha256sum "$P007/source/pre-test-inventory.json" > \
            "$P007/source/pre-test-inventory-artifact.sha256"
      # END P0-07 SOURCE-EPOCH TRUST BOUNDARY

      - name: Run Python harness and guarded component contracts with zero network
        run: |
          P007="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-07"
          mkdir -p \
            .llm-handoff-artifacts/p0-03/coverage \
            "$P007/coverage/python" \
            "$P007/test-results/python" \
            "$P007/green"
          rm -f \
            "$P007/coverage/python/inference-orchestrator.coverage" \
            "$P007/coverage/python/inference-orchestrator.json" \
            "$P007/coverage/python/rag-pipeline.coverage" \
            "$P007/coverage/python/rag-pipeline.json"
          rm -f .coverage
          "$PYTHON_ENV/bin/python" -m pytest \
            python-ecosystem/test-support/tests/test_offline_runner.py -q
          tools/offline-harness/bin/run-offline.sh \
            "$PYTHON_ENV/bin/python" -m pytest python-ecosystem/test-support/tests -q \
            --ignore=python-ecosystem/test-support/tests/test_offline_runner.py \
            --ignore=python-ecosystem/test-support/tests/p003_production_adapter_contracts \
            --cov=python-ecosystem/test-support/codecrow_test_harness \
            --cov-branch --cov-fail-under=100 \
            --cov-report=json:.llm-handoff-artifacts/p0-03/coverage/python-core.json
          mv .coverage .llm-handoff-artifacts/p0-03/coverage/python-core.coverage
          (cd python-ecosystem/test-support && \
            CODECROW_EXTERNAL_CALL_LEDGER="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-03/test-ledgers/python-profile-smoke.json" \
            ../../tools/offline-harness/bin/run-offline.sh \
            "$GITHUB_WORKSPACE/$PYTHON_ENV/bin/python" -m pytest \
            tests/test_profile_smoke.py::test_loaded_profile_records_a_scripted_call_in_its_process_ledger \
            -q -p codecrow_test_harness.pytest_plugin)
          (cd python-ecosystem/test-support && \
            CODECROW_EXTERNAL_CALL_LEDGER="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-03/test-ledgers/python-production-adapters.json" \
            ../../tools/offline-harness/bin/run-offline.sh \
            "$GITHUB_WORKSPACE/$PYTHON_ENV/bin/python" -m pytest \
            tests/p003_production_adapter_contracts \
            -q -p codecrow_test_harness.pytest_plugin)
          (cd python-ecosystem/inference-orchestrator && \
            CODECROW_EXTERNAL_CALL_LEDGER="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-03/test-ledgers/inference-unit.json" \
            ../../tools/offline-harness/bin/run-offline.sh \
            "$GITHUB_WORKSPACE/$PYTHON_ENV/bin/python" -m pytest tests -q \
            --cov --cov-branch \
            --cov-config="$GITHUB_WORKSPACE/tools/quality-gates/config/inference.coveragerc" \
            --cov-report= \
