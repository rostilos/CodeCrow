            --base-attestation tools/quality-gates/policy/comparison-base-v1.json \
            --base-attestation-sha256 58b54d329ca06db021eb26e2b32a58a20ab6794e39dc6da91224a13e33802666 \
            --baseline-manifest-sha256 be9893de0ad6dc3de087aac21aac11f79b1c8f8962e7184782c53016bacd3c9c \
            --include-worktree \
            --correctness-policy tools/quality-gates/policy/correctness-policy-v1.json \
            --output "$P007/base/changes.json"
          mkdir -p "$P007/receipts"
          tools/quality-gates/bin/run-locked-python.sh \
            --prepare "$GITHUB_WORKSPACE/$PYTHON_ENV"
          tools/offline-harness/bin/run-offline.sh \
            "$GITHUB_WORKSPACE/tools/quality-gates/bin/run-locked-python.sh" \
            -m pytest -q \
            --junitxml=.llm-handoff-artifacts/p0-07/receipts/configuration-contracts.junit.xml \
            tools/quality-gates/tests/test_compensating_configuration_contracts.py::test_critical_declarative_configuration_contracts
          "${QUALITY[@]}" capture-exclusion-receipts \
            --changes "$P007/base/changes.json" \
            --exclusions tools/quality-gates/policy/exclusions-v1.json \
            --junit "$P007/receipts/configuration-contracts.junit.xml" \
            --ledger "$P007/receipts/configuration-contract-ledger.json" \
            --as-of "$P007_AS_OF" \
            --repository-root . \
