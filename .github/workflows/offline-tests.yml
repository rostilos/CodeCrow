            --base-attestation tools/quality-gates/policy/comparison-base-v1.json \
            --base-attestation-sha256 58b54d329ca06db021eb26e2b32a58a20ab6794e39dc6da91224a13e33802666 \
            --baseline-manifest-sha256 be9893de0ad6dc3de087aac21aac11f79b1c8f8962e7184782c53016bacd3c9c \
            --output "$P007/gate/result.json"
      # END P0-07 NORMALIZATION/FINAL REVALIDATION

      - name: Run real persistence lifecycle behind exact client leases
        run: |
          PERSISTENCE_ROOT="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-03/persistence"
          PERSISTENCE_HOME="$PERSISTENCE_ROOT/home"
          PERSISTENCE_TMP="$PERSISTENCE_ROOT/tmp"
          PERSISTENCE_DOCKER_CONFIG="$PERSISTENCE_ROOT/anonymous-docker-config"
          PERSISTENCE_LEDGER="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-03/test-ledgers/java-persistence-lifecycle.json"
          CONTAINER_REPORT="$PERSISTENCE_ROOT/container-report.json"
          IMAGE_EVENTS="$PERSISTENCE_ROOT/runtime-image-events.jsonl"
          rm -rf "$PERSISTENCE_ROOT"
          rm -f "$PERSISTENCE_LEDGER"
          mkdir -p \
            "$PERSISTENCE_HOME" \
            "$PERSISTENCE_TMP" \
            "$PERSISTENCE_DOCKER_CONFIG"
          printf '{}\n' > "$PERSISTENCE_DOCKER_CONFIG/config.json"

          STARTED_AT="$(date +%s)"
          set +e
          (cd java-ecosystem && \
            /usr/bin/env -i \
              PATH="$JAVA_HOME/bin:/usr/bin:/bin" \
              JAVA_HOME="$JAVA_HOME" \
              HOME="$PERSISTENCE_HOME" \
              USER=codecrow-test \
              LOGNAME=codecrow-test \
              LANG=C.UTF-8 \
              LC_ALL=C.UTF-8 \
              TZ=UTC \
              TMPDIR="$PERSISTENCE_TMP" \
              DOCKER_CONFIG="$PERSISTENCE_DOCKER_CONFIG" \
              TESTCONTAINERS_HOST_OVERRIDE=127.0.0.1 \
              TESTCONTAINERS_RYUK_DISABLED=true \
              TESTCONTAINERS_REUSE_ENABLE=false \
              CODECROW_EXTERNAL_CALL_LEDGER="$PERSISTENCE_LEDGER" \
              CODECROW_PERSISTENCE_CONTAINER_IDS="$CONTAINER_REPORT" \
              MAVEN_OPTS="-Dmaven.repo.local=$GITHUB_WORKSPACE/$MAVEN_REPOSITORY -Duser.home=$PERSISTENCE_HOME" \
              /usr/bin/mvn \
                -s "$GITHUB_WORKSPACE/tools/offline-harness/maven/settings-ci.xml" \
                -o -B --no-transfer-progress \
                -Dmaven.repo.local="$GITHUB_WORKSPACE/$MAVEN_REPOSITORY" \
                -Poffline-persistence-lifecycle \
                -pl libs/test-support -am clean verify) 2>&1 | \
            tee "$PERSISTENCE_ROOT/persistence-lifecycle.txt"
          PROFILE_STATUS="${PIPESTATUS[0]}"
          FINISHED_AT="$(( $(date +%s) + 1 ))"
          /usr/bin/env -i \
            PATH=/usr/bin:/bin \
            HOME="$PERSISTENCE_HOME" \
            DOCKER_CONFIG="$PERSISTENCE_DOCKER_CONFIG" \
            /usr/bin/docker events \
              --since "$STARTED_AT" \
              --until "$FINISHED_AT" \
              --filter type=image \
              --format '{{json .}}' > "$IMAGE_EVENTS"
          EVENT_CAPTURE_STATUS="$?"
          set -e

          VALIDATION_STATUS=0
          "$PYTHON_ENV/bin/python" \
            tools/offline-harness/bin/validate-docker-image-events.py \
            "$IMAGE_EVENTS" | \
            tee "$PERSISTENCE_ROOT/runtime-image-event-validation.txt" || \
            VALIDATION_STATUS=1
          "$PYTHON_ENV/bin/python" \
            tools/offline-harness/bin/validate-ledgers.py \
            "$PERSISTENCE_LEDGER" | \
            tee "$PERSISTENCE_ROOT/ledger-validation.txt" || \
            VALIDATION_STATUS=1
          "$PYTHON_ENV/bin/python" \
            tools/offline-harness/bin/validate-persistence-container-report.py \
            "$CONTAINER_REPORT" | \
            tee "$PERSISTENCE_ROOT/container-report-validation.txt" || \
            VALIDATION_STATUS=1

          mapfile -t OWNED_CONTAINER_IDS < <(
            "$PYTHON_ENV/bin/python" \
              tools/offline-harness/bin/validate-persistence-container-report.py \
              --print-container-ids "$CONTAINER_REPORT"
          )
          if test "${#OWNED_CONTAINER_IDS[@]}" -ne 6; then
            VALIDATION_STATUS=1
          fi
          : > "$PERSISTENCE_ROOT/exact-container-absence.txt"
          for container_id in "${OWNED_CONTAINER_IDS[@]}"; do
            if /usr/bin/env -i \
              PATH=/usr/bin:/bin \
              HOME="$PERSISTENCE_HOME" \
              DOCKER_CONFIG="$PERSISTENCE_DOCKER_CONFIG" \
              /usr/bin/docker container inspect "$container_id" >/dev/null 2>&1; then
              printf 'retained %s\n' "$container_id" >> \
                "$PERSISTENCE_ROOT/exact-container-absence.txt"
              VALIDATION_STATUS=1
            else
              printf 'absent %s\n' "$container_id" >> \
                "$PERSISTENCE_ROOT/exact-container-absence.txt"
            fi
          done
          cat "$PERSISTENCE_ROOT/exact-container-absence.txt"

          mapfile -t PERSISTENCE_IMAGES < <(
            "$PYTHON_ENV/bin/python" \
              tools/offline-harness/bin/validate-persistence-images.py \
              --print-runtime-references \
              tools/offline-harness/requirements/persistence-images-v1.json
          )
          /usr/bin/env -i \
            PATH=/usr/bin:/bin \
            HOME="$PERSISTENCE_HOME" \
            DOCKER_CONFIG="$PERSISTENCE_DOCKER_CONFIG" \
            /usr/bin/docker image inspect "${PERSISTENCE_IMAGES[@]}" > \
            "$PERSISTENCE_ROOT/runtime-image-inspect.json"
          "$PYTHON_ENV/bin/python" \
            tools/offline-harness/bin/validate-persistence-images.py \
            tools/offline-harness/requirements/persistence-images-v1.json \
            "$PERSISTENCE_ROOT/runtime-image-inspect.json" | \
            tee "$PERSISTENCE_ROOT/runtime-image-validation.txt" || \
            VALIDATION_STATUS=1

          if test "$PROFILE_STATUS" -ne 0 \
            || test "$EVENT_CAPTURE_STATUS" -ne 0 \
            || test "$VALIDATION_STATUS" -ne 0; then
            exit 1
          fi
          sha256sum \
            "$PERSISTENCE_ROOT/persistence-lifecycle.txt" \
            "$PERSISTENCE_ROOT/runtime-image-events.jsonl" \
            "$PERSISTENCE_ROOT/runtime-image-event-validation.txt" \
            "$PERSISTENCE_ROOT/ledger-validation.txt" \
            "$PERSISTENCE_ROOT/container-report.json" \
            "$PERSISTENCE_ROOT/container-report-validation.txt" \
            "$PERSISTENCE_ROOT/exact-container-absence.txt" \
            "$PERSISTENCE_ROOT/runtime-image-inspect.json" \
            "$PERSISTENCE_ROOT/runtime-image-validation.txt" | \
            tee "$PERSISTENCE_ROOT/persistence-evidence-sha256.txt"

      - name: Revalidate protected P0-07 evidence immediately before checksums
        if: success()
        env:
          P007_PROTECTED_TRUST_BUNDLE_SHA256: ${{ vars.P007_TRUST_BUNDLE_SHA256 }}
        run: |
          P007="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-07"
          QUALITY=(env PYTHONPATH=tools/quality-gates "$PYTHON_ENV/bin/python" -m quality_gates)
          TRUST_BUNDLE=tools/quality-gates/policy/trust-bundle-v1.json
          test -n "$P007_PROTECTED_TRUST_BUNDLE_SHA256"
          [[ "$P007_PROTECTED_TRUST_BUNDLE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          test "$P007_PROTECTED_TRUST_BUNDLE_SHA256" = \
            "${{ steps.p007_trust_bootstrap.outputs.bundle_sha256 }}"
          test ! -L "$TRUST_BUNDLE" -a -f "$TRUST_BUNDLE"
          test "$(/usr/bin/stat -c '%s' "$TRUST_BUNDLE")" -le 1048576
          test "$(/usr/bin/sha256sum "$TRUST_BUNDLE" | /usr/bin/cut -d' ' -f1)" = \
            "$P007_PROTECTED_TRUST_BUNDLE_SHA256"
          /usr/bin/python3 -I -S - \
            "$TRUST_BUNDLE" \
            "$P007_PROTECTED_TRUST_BUNDLE_SHA256" <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import re
          import stat
          import sys

          MAX_BUNDLE_BYTES = 1024 * 1024
          MAX_ENTRY_BYTES = 64 * 1024 * 1024
          ROLES = {"implementation", "policy", "schema", "workflow", "runner"}
          SHA256 = re.compile(r"^[0-9a-f]{64}$")

          def reject_duplicates(pairs):
              value = {}
              for key, item in pairs:
                  if key in value:
                      raise ValueError("duplicate trust-bundle key")
                  value[key] = item
              return value

          def safe_parts(value):
              candidate = pathlib.PurePosixPath(value) if isinstance(value, str) else None
              if (
                  candidate is None
                  or not value
                  or value == "."
                  or candidate.is_absolute()
                  or ".." in candidate.parts
                  or candidate.as_posix() != value
                  or "\\" in value
                  or any(ord(character) < 32 or ord(character) == 127 for character in value)
              ):
                  raise ValueError("unsafe trust path")
              return candidate.parts

          def read_regular(root_fd, value, size_limit):
              parts = safe_parts(value)
              parent_fd = os.dup(root_fd)
              try:
                  for component in parts[:-1]:
                      child_fd = os.open(
                          component,
                          os.O_RDONLY | os.O_DIRECTORY | os.O_NOFOLLOW,
                          dir_fd=parent_fd,
                      )
                      os.close(parent_fd)
                      parent_fd = child_fd
                  file_fd = os.open(
                      parts[-1],
                      os.O_RDONLY | os.O_NOFOLLOW,
                      dir_fd=parent_fd,
                  )
                  try:
                      metadata = os.fstat(file_fd)
                      if not stat.S_ISREG(metadata.st_mode) or metadata.st_size > size_limit:
                          raise ValueError("trusted path is not a bounded regular file")
                      chunks = []
                      remaining = size_limit + 1
                      while remaining:
                          chunk = os.read(file_fd, min(1024 * 1024, remaining))
                          if not chunk:
                              break
                          chunks.append(chunk)
                          remaining -= len(chunk)
                      raw = b"".join(chunks)
                      if len(raw) > size_limit:
                          raise ValueError("trusted path exceeds size limit")
                      return raw
                  finally:
                      os.close(file_fd)
              finally:
                  os.close(parent_fd)

          bundle_path, expected_bundle_sha256 = sys.argv[1:]
          if SHA256.fullmatch(expected_bundle_sha256) is None:
              raise ValueError("protected trust-bundle digest is malformed")
          root_fd = os.open(".", os.O_RDONLY | os.O_DIRECTORY | os.O_NOFOLLOW)
          try:
              root_identity = os.fstat(root_fd)
              bundle_raw = read_regular(root_fd, bundle_path, MAX_BUNDLE_BYTES)
              if hashlib.sha256(bundle_raw).hexdigest() != expected_bundle_sha256:
                  raise ValueError("protected trust-bundle digest mismatch")
              bundle = json.loads(bundle_raw, object_pairs_hook=reject_duplicates)
              if (
                  not isinstance(bundle, dict)
                  or set(bundle) != {"schemaVersion", "bundleId", "files"}
                  or bundle["schemaVersion"] != 1
                  or bundle["bundleId"] != "p0-07-quality-contract-v1"
                  or not isinstance(bundle["files"], list)
                  or not bundle["files"]
              ):
                  raise ValueError("malformed trust bundle")
              previous = ""
              for entry in bundle["files"]:
                  if not isinstance(entry, dict) or set(entry) != {"path", "role", "sha256"}:
                      raise ValueError("malformed trust entry")
                  path = entry["path"]
                  digest = entry["sha256"]
                  safe_parts(path)
                  if (
                      path <= previous
                      or entry["role"] not in ROLES
                      or not isinstance(digest, str)
                      or SHA256.fullmatch(digest) is None
                  ):
                      raise ValueError("unsafe trust entry")
                  previous = path
                  if hashlib.sha256(
                      read_regular(root_fd, path, MAX_ENTRY_BYTES)
                  ).hexdigest() != digest:
                      raise ValueError(f"trusted quality contract drifted: {path}")
              final_identity = os.fstat(root_fd)
              if (
                  root_identity.st_dev,
                  root_identity.st_ino,
              ) != (
                  final_identity.st_dev,
                  final_identity.st_ino,
              ):
                  raise ValueError("repository root changed during trust bootstrap")
          finally:
              os.close(root_fd)
          PY
          "${QUALITY[@]}" verify-trust-bundle \
            --bundle "$TRUST_BUNDLE" \
            --bundle-sha256 "$P007_PROTECTED_TRUST_BUNDLE_SHA256" \
            --repository-root .
          REPORT_ARGS=(
            --report "$P007/coverage/java/aggregate.json"
            --report "$P007/coverage/python/normalized/inference-orchestrator.json"
            --report "$P007/coverage/python/normalized/rag-pipeline.json"
            --report "$P007/coverage/python/normalized/quality-gates.json"
            --report "$P007/coverage/python/aggregate.json"
          )
          while IFS= read -r report; do
            REPORT_ARGS+=(--report "$report")
          done < <(find "$P007/coverage/java/modules" -name coverage.json -type f | LC_ALL=C sort)
          "${QUALITY[@]}" evaluate \
            --changes "$P007/base/changes.json" \
            "${REPORT_ARGS[@]}" \
            --baseline tools/quality-gates/policy/coverage-baseline-v1.json \
            --exclusions tools/quality-gates/policy/exclusions-v1.json \
            --as-of "$P007_AS_OF" \
            --repository-root . \
            --source-inventory-policy tools/quality-gates/policy/source-inventory-policy-v1.json \
            --pinned-source-inventory "$P007/source/pre-test-inventory.json" \
            --pinned-source-inventory-artifact-sha256 \
              "${{ steps.p007_source_inventory.outputs.artifact_sha256 }}" \
            --correctness-policy tools/quality-gates/policy/correctness-policy-v1.json \
            --base-attestation tools/quality-gates/policy/comparison-base-v1.json \
            --base-attestation-sha256 58b54d329ca06db021eb26e2b32a58a20ab6794e39dc6da91224a13e33802666 \
            --baseline-manifest-sha256 be9893de0ad6dc3de087aac21aac11f79b1c8f8962e7184782c53016bacd3c9c \
            --output "$P007/gate/final-revalidated-result.json"
          test "$(sha256sum "$P007/source/pre-test-inventory.json" | cut -d' ' -f1)" = \
            "${{ steps.p007_source_inventory.outputs.artifact_sha256 }}"
          sha256sum "$P007/source/pre-test-inventory.json" > \
            "$P007/source/pre-test-inventory-artifact.sha256"
          cmp --silent \
            "$P007/gate/result.json" \
            "$P007/gate/final-revalidated-result.json"

      - name: Checksum P0-07 quality-gate evidence
        if: always()
        run: |
          mkdir -p .llm-handoff-artifacts/p0-07
          find \
            .llm-handoff-artifacts/p0-07 \
            .llm-handoff-artifacts/p0-03/test-ledgers \
            -type f \
            ! -path '.llm-handoff-artifacts/p0-07/evidence-sha256.txt' \
            -print0 | \
            LC_ALL=C sort -z | \
            xargs -0 -r sha256sum > \
              .llm-handoff-artifacts/p0-07/evidence-sha256.txt

      - name: Upload offline ledgers, reports, and P0-07 quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-test-evidence
          include-hidden-files: true
          if-no-files-found: error
          path: |
            .llm-handoff-artifacts/p0-03/
            .llm-handoff-artifacts/p0-07/
            java-ecosystem/**/target/surefire-reports/
            java-ecosystem/**/target/failsafe-reports/
          retention-days: 14
