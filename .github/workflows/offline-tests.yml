      # BEGIN P0-07 NORMALIZATION/FINAL REVALIDATION (quality-gate owned)
      - name: Normalize and enforce the P0-07 changed-path coverage gate
        run: |
          P007="$GITHUB_WORKSPACE/.llm-handoff-artifacts/p0-07"
          QUALITY=(env PYTHONPATH=tools/quality-gates "$PYTHON_ENV/bin/python" -m quality_gates)
          mkdir -p \
