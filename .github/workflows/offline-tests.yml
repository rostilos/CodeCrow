            --repository-root . \
            --source-inventory-sha256 "${{ steps.p007_source_inventory.outputs.inventory_sha256 }}" \
            --output "$P007/coverage/python/normalized/rag-pipeline.json"
          "${QUALITY[@]}" normalize-coveragepy \
            --input "$P007/coverage/quality-gates.json" \
            --module tools/quality-gates \
            --source-prefix tools/quality-gates \
            --repository-root . \
            --source-inventory-sha256 "${{ steps.p007_source_inventory.outputs.inventory_sha256 }}" \
            --output "$P007/coverage/python/normalized/quality-gates.json"
          "${QUALITY[@]}" aggregate \
