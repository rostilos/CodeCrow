          baseline = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          digest = hashlib.sha256(pathlib.Path(sys.argv[2]).read_bytes()).hexdigest()
          assert digest == baseline["sourceSnapshotSha256"]
          ' tools/quality-gates/policy/coverage-baseline-v1.json \
            tools/quality-gates/policy/source-snapshot-v1.json
          REPORT_ARGS=(
            --report "$P007/coverage/java/aggregate.json"
