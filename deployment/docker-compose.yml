services:
  postgres:
    image: postgres:15-alpine
    container_name: codecrow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codecrow_ai}
      POSTGRES_USER: ${POSTGRES_USER:-codecrow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codecrow-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-codecrow_user} -d $${POSTGRES_DB:-codecrow_ai}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: codecrow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@localhost}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD must be set in .env}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "True"
      PGADMIN_DISABLE_POSTFIX: "True"
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - codecrow-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codecrow-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - codecrow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: codecrow-qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY must be set in .env}
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - codecrow-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c '>/dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web-server:
    build:
      context: ../java-ecosystem/services/web-server
    container_name: codecrow-web-application
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-codecrow_ai}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-codecrow_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}

      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_CONFIG_LOCATION: file:/app/config/application.properties

      # Flyway database migrations (web-server is the migration owner)
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration/managed

      SERVER_PORT: 8081

      SPRING_SESSION_STORE_TYPE: redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when-authorized
      LOGGING_FILE_NAME: /app/logs/codecrow-web-application.log

      CODECROW_INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in .env}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codecrow-network
    volumes:
      - source_code_tmp:/tmp
      - web_logs:/app/logs
      - ./config/java-shared/application.properties:/app/config/application.properties
      - ./config/java-shared/github-private-key/github-app-private-key.pem:/app/config/github-app-private-key.pem
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  pipeline-agent:
    build:
      context: ../java-ecosystem/services/pipeline-agent
    container_name: codecrow-pipeline-agent
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-codecrow_ai}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-codecrow_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}

      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_CONFIG_LOCATION: file:/app/config/application.properties

      # Flyway disabled — web-server is the migration owner
      SPRING_FLYWAY_ENABLED: "false"

      SERVER_PORT: 8082

      SPRING_SESSION_STORE_TYPE: redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      RAG_API_URL: http://rag-pipeline:8001
      RAG_ENABLED: "true"
      #JAVA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006"
      LOGGING_FILE_NAME: /app/logs/codecrow-pipeline-agent.log
    ports:
      - "8082:8082"
      #- "5006:5006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fix-permissions:
        condition: service_completed_successfully
    networks:
      - codecrow-network
    volumes:
      - source_code_tmp:/tmp
      - pipeline_agent_logs:/app/logs
      - ./config/java-shared/application.properties:/app/config/application.properties
      - ./config/java-shared/github-private-key/github-app-private-key.pem:/app/config/github-app-private-key.pem
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  inference-orchestrator:
    build:
      context: ../python-ecosystem/inference-orchestrator/src
    container_name: codecrow-inference-orchestrator
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - rag-pipeline
      - web-server
      - redis
    environment:
      CODECROW_API_URL: http://codecrow-web-application:8081
      PLATFORM_MCP_JAR: /app/codecrow-platform-mcp-1.0.jar
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in .env}
      # Redis connection for async analysis queue (DB 1 to isolate from session storage on DB 0)
      REDIS_URL: redis://redis:6379/1
    networks:
      - codecrow-network
    volumes:
      - ./config/inference-orchestrator/.env:/app/.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  rag-pipeline:
    build:
      context: ../python-ecosystem/rag-pipeline
    container_name: codecrow-rag-pipeline
    environment:
      CODECROW_WEB_SERVER_URL: http://web-server:8081
      CODECROW_INTERNAL_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in .env}
      QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY must be set in .env}
      REDIS_URL: redis://redis:6379/1
      #UVICORN_WORKERS: 1
    ports:
      - "127.0.0.1:8001:8001"
      #- "127.0.0.1:5678:5678"
    depends_on:
      redis:
        condition: service_healthy
      fix-permissions:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      web-server:
        condition: service_healthy
    networks:
      - codecrow-network
    #command: ["python", "-m", "debugpy", "--listen", "0.0.0.0:5678", "main.py"]
    volumes:
      - source_code_tmp:/tmp
      - rag_logs:/app/logs
      - ./config/rag-pipeline/.env:/app/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web-frontend:
    build:
      context: ../frontend
    container_name: codecrow-web-frontend
    ports:
      - "8080:8080"
    networks:
      - codecrow-network
    volumes:
      - web_frontend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  fix-permissions:
    image: busybox
    command: sh -c "chmod -R 777 /tmp"
    volumes:
      - source_code_tmp:/tmp

volumes:
  source_code_tmp:
    name: source_code_tmp
    driver: local
  shared_keys:
    name: shared_keys
    driver: local
  postgres_data:
    name: postgres_data
    driver: local
  redis_data:
    name: redis_data
    driver: local
  qdrant_data:
    name: qdrant_data
    driver: local
  pgadmin_data:
    name: pgadmin_data
    driver: local
  web_logs:
    name: web_logs
    driver: local
  pipeline_agent_logs:
    name: agent_logs
    driver: local
  web_frontend_logs:
    name: frontend_logs
    driver: local
  rag_logs:
    name: rag_logs
    driver: local

networks:
  codecrow-network:
    driver: bridge
