# Shared test properties for all integration tests
# Applied via the "it" profile: application-it.properties

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.datasource.hikari.maximum-pool-size=5

# JWT defaults for test
codecrow.jwt.secret=test-jwt-secret-that-is-long-enough-for-hs256-algorithm-requirement
codecrow.jwt.expiration-ms=3600000
codecrow.jwt.refresh-expiration-ms=86400000
codecrow.token.encryption-key=01234567890123456789012345678901

# Disable email in tests
spring.mail.host=localhost
spring.mail.port=3025
codecrow.email.enabled=false

# Disable RAG in tests
codecrow.rag.api.enabled=false

# Disable MCP in tests
codecrow.mcp.client.enabled=false

# Logging
logging.level.org.rostilos.codecrow=DEBUG
logging.level.org.hibernate.SQL=WARN
