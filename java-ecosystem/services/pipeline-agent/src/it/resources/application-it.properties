# Pipeline Agent Integration Test Configuration
# ─────────────────────────────────────────────────
# Database — Testcontainers PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.flyway.enabled=false

# JWT Configuration (same key format as web-server for shared JwtUtils)
codecrow.app.jwtSecret=dGVzdC1zZWNyZXQta2V5LWZvci1pbnRlZ3JhdGlvbi10ZXN0cy1tdXN0LWJlLWxvbmctZW5vdWdoLWZvci1obWFjLXNoYTI1Ng==
codecrow.app.jwtExpirationMs=86400000
codecrow.app.refreshTokenExpirationMs=604800000
codecrow.app.projectJwtExpirationMs=7776000000
codecrow.security.jwtSecret=dGVzdC1zZWNyZXQta2V5LWZvci1pbnRlZ3JhdGlvbi10ZXN0cy1tdXN0LWJlLWxvbmctZW5vdWdoLWZvci1obWFjLXNoYTI1Ng==
codecrow.security.jwtExpirationMs=86400000
codecrow.security.refreshTokenExpirationMs=604800000
codecrow.security.projectJwtExpirationMs=7776000000

# Security encryption keys (required by PipelineAgentSecurityConfig)
codecrow.security.encryption-key=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
codecrow.security.encryption-key-old=ZmVkY2JhOTg3NjU0MzIxMGZlZGNiYTk4NzY1NDMyMTA=

# Server — random port
server.port=0
server.address=127.0.0.1
server.servlet.context-path=

# Keep scheduler bean valid in tests
spring.task.scheduling.pool.size=1

# Disable external integrations
codecrow.vcs.bitbucket.app-name=test
codecrow.vcs.bitbucket.client-id=test
codecrow.vcs.bitbucket.client-secret=test
codecrow.vcs.github.app-id=test
codecrow.vcs.github.client-id=test
codecrow.vcs.github.client-secret=test
codecrow.vcs.github.private-key-path=
codecrow.vcs.gitlab.client-id=test
codecrow.vcs.gitlab.client-secret=test

# RAG pipeline — disabled in tests
codecrow.rag.api.enabled=false
codecrow.rag.api.url=http://127.0.0.1:19999
codecrow.rag.api.secret=test-rag-secret

# Inference orchestrator — disabled in tests
codecrow.inference-orchestrator.url=http://127.0.0.1:19998
codecrow.inference-orchestrator.service-secret=test-io-secret

# Other outbound adapters — disabled in tests
spring.mail.host=127.0.0.1
spring.mail.port=3025
codecrow.email.enabled=false
codecrow.mcp.client.enabled=false

# Analysis lock settings
codecrow.analysis.lock.timeout-ms=30000

# HikariCP
spring.datasource.hikari.maximum-pool-size=5

# Logging
logging.level.org.rostilos.codecrow=DEBUG
logging.level.org.springframework.security=DEBUG
