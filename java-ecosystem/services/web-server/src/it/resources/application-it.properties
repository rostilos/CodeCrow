# web-server integration test — application properties
# Profile: "it" — activated by @IntegrationTest annotation

# ── Datasource (Testcontainers provides URL dynamically) ──────
# spring.datasource.* properties are injected by PostgresContainerInitializer
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Flyway (disabled for ITs — use JPA auto-DDL instead) ──────
spring.flyway.enabled=false

# ── Security ──────────────────────────────────────────────────
codecrow.security.jwtSecret=dGVzdC1zZWNyZXQta2V5LWZvci1pbnRlZ3JhdGlvbi10ZXN0cy1taW4tMjU2LWJpdHM=
codecrow.security.jwtExpirationMs=86400000
codecrow.security.refreshTokenExpirationMs=604800000
codecrow.security.projectJwtExpirationMs=7776000000
codecrow.security.internalApiSecret=test-internal-secret

# ── Server ────────────────────────────────────────────────────
server.port=0

# ── Async (disable for deterministic IT) ──────────────────────
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=2
spring.task.scheduling.pool.size=1

# ── Logging ───────────────────────────────────────────────────
logging.level.org.rostilos.codecrow=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN

# ── Disable external integrations ─────────────────────────────
spring.mail.host=localhost
spring.mail.port=3025
codecrow.rag.api.url=http://localhost:19999
codecrow.analysis.lock.enabled=false
